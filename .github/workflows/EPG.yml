name: Update EPG Data

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Preparation and Download
        run: |
          # 1. 确保目录干净且存在
          rm -rf EPG/
          mkdir -p EPG

          # 2. 下载数据源 (使用 -L 处理重定向, -f 遇错停止)
          echo "正在下载远程 EPG 数据..."
          curl -Lfs --retry 3 "https://epg.catvod.com/epg.xml.gz" -o EPG/epg.xml.gz || echo "epg 下载失败"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/taksssss/tv/main/epg/epgpw_hk.xml.gz" -o EPG/hk.xml.gz || echo "HK 下载失败"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/taksssss/tv/main/epg/epgpw_tw.xml.gz" -o EPG/tw.xml.gz || echo "TW 下载失败"
          
          # 3. 自动解压所有下载的 gz 文件
          # 逻辑：解压为同名 .xml 文件，并删除原始压缩包以节省空间
          echo "正在解压数据..."
          for f in EPG/*.gz; do
            if [ -f "$f" ]; then
              # 获取不含扩展名的文件名 (例如 EPG/hk)
              base=$(echo "$f" | sed 's/\.xml\.gz//')
              gunzip -c "$f" > "${base}.xml"
              rm "$f"
              echo "已完成: $f -> ${base}.xml"
            fi
          done

          # 4. 调试：列出文件确保 pl.xml, hk.xml, tw.xml, e9.xml 都在位
          ls -R EPG/
      - name: Run EPG Processor
        run: |
          # 确保 EPG 目录干净且存在
          mkdir -p EPG
          php epg.php
          # 关键调试步骤：在日志里列出到底生成了什么
          ls -R EPG/

      - name: Deploy to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 1. 先把所有新生成的 JSON 文件夹加进去
          git add EPG/
          
          # 2. 强制删掉不需要提交的原始大文件（XML/GZ）
          # 这样仓库里就只有干净的 01/ 02/ 目录
          find EPG -maxdepth 1 -name "*.xml" -delete
          find EPG -maxdepth 1 -name "*.gz" -delete
          
          # 3. 提交变更
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git push origin main
          fi
