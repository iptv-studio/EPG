name: Update EPG Data

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Preparation and Download
        run: |
          # 步骤 1：执行前清理（物理删除旧的 EPG 目录重新开始）
          rm -rf EPG/
          mkdir -p EPG
          
          # 下载源
          curl -Lfs --retry 3 "https://tv.mxdyeah.top/epgphp/t.xml.gz" -o EPG/t.xml.gz || echo "T failed"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/litiande03/epg/refs/heads/master/pl.xml.gz" -o EPG/pl.xml.gz || echo "PL failed"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/taksssss/tv/main/epg/epgpw_hk.xml.gz" -o EPG/hk.xml.gz || echo "HK failed"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/taksssss/tv/main/epg/epgpw_tw.xml.gz" -o EPG/tw.xml.gz || echo "TW failed"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/yenkj/epg/refs/heads/main/boss.xml" -o EPG/boss.xml || echo "BOSS failed"
          
          # 解压前先备份一份 gz（如果需要保存原始压缩包）
          mkdir -p raw_backup
          cp EPG/*.gz raw_backup/ 2>/dev/null || true
          cp EPG/boss.xml raw_backup/ 2>/dev/null || true

          # 执行解压
          for f in EPG/*.gz; do
            [ -e "$f" ] || continue
            gunzip -f "$f"
          done

      - name: Run EPG Processor
        run: |
          # 运行 PHP 脚本，生成 JSON 分箱
          php epg.php

      - name: Deploy JSON to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 关键操作：在 git add 之前，把不想进仓库的大文件移走
          # 这样 git 就不会追踪这些几百 MB 的 XML 了
          mkdir -p ../temp_xmls
          mv EPG/*.xml ../temp_xmls/ 2>/dev/null || true

          git add EPG/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

      # 步骤 2：执行完后保存 XML 和 GZ 作为 Action 产物 (保留 90 天)
      - name: Upload Raw XMLs
        uses: actions/upload-artifact@v4
        with:
          name: raw-epg-files
          path: |
            raw_backup/
            ../temp_xmls/
